services:
  # PostgreSQL - Base de datos
  db:
    image: postgres:16-alpine
    container_name: motorconnect-db
    environment:
      POSTGRES_USER: ${DB_USER:-motorconnect}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-localdev123}
      POSTGRES_DB: ${DB_NAME:-motorconnect_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U motorconnect"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - motorconnect-net
    restart: unless-stopped

  # Qdrant - Vector Store
  qdrant:
    image: qdrant/qdrant:latest
    container_name: motorconnect-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT_API_KEY: ${QDRANT_API_KEY:-qdrant-key}
    networks:
      - motorconnect-net
    restart: unless-stopped

  # Redis - Hot Sessions
  redis:
    image: redis/redis-stack:latest
    container_name: motorconnect-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru
    networks:
      - motorconnect-net
    restart: unless-stopped

  # MongoDB - Cold Persistent Logs
  mongodb:
    image: mongo:7.0
    container_name: motorconnect-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-motorconnect}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-localdev123}
      MONGO_INITDB_DATABASE: motorconnect_logs
    volumes:
      - mongo_data:/data/db
    networks:
      - motorconnect-net
    restart: unless-stopped

  # Backend - FastAPI
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: motorconnect-backend
    environment:
      DATABASE_URL: postgresql://${DB_USER:-motorconnect}:${DB_PASSWORD:-localdev123}@db:5432/${DB_NAME:-motorconnect_db}
      QDRANT_URL: http://qdrant:6333
      QDRANT_API_KEY: ${QDRANT_API_KEY:-qdrant-key}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      JWT_SECRET: ${JWT_SECRET:-your-secret-key-change-in-prod}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      DEBUG: ${DEBUG:-False}
      REDIS_URL: redis://redis:6379/0
      MONGO_URI: mongodb://${MONGO_USER:-motorconnect}:${MONGO_PASSWORD:-localdev123}@mongodb:27017/motorconnect_logs
      MONGO_DB_NAME: motorconnect_logs
      GROQ_API_KEY: ${GROQ_API_KEY:-}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      qdrant:
        condition: service_started
      redis:
        condition: service_started
      mongodb:
        condition: service_started
    volumes:
      - ./backend:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - motorconnect-net
    restart: unless-stopped

  # Frontend - React + Nginx
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://backend:8000
    container_name: motorconnect-web
    ports:
      - "5173:80"
    depends_on:
      - backend
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    networks:
      - motorconnect-net
    restart: unless-stopped

volumes:
  postgres_data:
  qdrant_data:
  redis_data:
  mongo_data:

networks:
  motorconnect-net:
    driver: bridge
